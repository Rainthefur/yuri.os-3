# Custom Yuri OS Gaming Blueprint
name: yuri-gaming-os
description: A customized Madoka Magica themed Bazzite gaming distribution.
image-version: 40
base-image: ghcr.io/ublue-os/bazzite-nvidia

modules:
  - type: rpm-ostree
    install:
      - tmux
      - mpv
      - aria2

  - type: default-flatpaks
    configurations:
      - system:
          install:
            - com.valvesoftware.Steam
            - com.discordapp.Discord
            - com.spotify.Client

  - type: script
    snippets:
      - "curl -sL https://githubusercontent.com > /usr/bin/ani-cli && chmod +x /usr/bin/ani-cli"
